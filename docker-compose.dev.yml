version: '3.8'

services:
  app:
    build:
      context: .
      target: deps
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_DEMO_MODE=true
      - DATABASE_URL=postgresql://itfinance:itfinance@db:5432/itfinance
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=itfinance
      - POSTGRES_PASSWORD=itfinance
      - POSTGRES_DB=itfinance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itfinance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
